<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Entry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.2rem; }
    .nav { display: flex; gap: .8rem; margin-bottom: 1.5rem; }
    .nav a { color: #4f46e5; text-decoration: none; font-size: .95rem; }
    .nav a:hover { text-decoration: underline; }
    .card { background: #fff; border-radius: 8px; padding: 1.2rem; max-width: 500px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    h2 { font-size: 1.1rem; margin-bottom: .8rem; color: #444; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; }
    input[type=number], input[type=text], textarea {
      width: 100%; padding: .5rem .7rem; border: 1px solid #ccc; border-radius: 5px;
      font-size: .95rem; margin-bottom: .8rem;
    }
    textarea { resize: vertical; min-height: 70px; }
    .btn { display: inline-block; padding: .45rem .9rem; border: none; border-radius: 5px; cursor: pointer; font-size: .9rem; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #e5e7eb; color: #222; text-decoration: none; }
    .btn-secondary:hover { background: #d1d5db; }
    .error { background: #fee2e2; border: 1px solid #f87171; color: #991b1b; padding: .6rem 1rem; border-radius: 5px; margin-bottom: 1rem; }
    .actions { display: flex; gap: .6rem; align-items: center; }
  </style>
</head>
<body>
  <h1>Mood Journal</h1>
  <nav class="nav">
    <a href="/">All Entries</a>
    <a href="/chart">Weekly Chart</a>
  </nav>

  <div class="card">
    <h2>Edit Entry</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/mood/{{ entry.id }}/update">
      <label for="mood_score">Mood Score (1–5)</label>
      <input type="number" id="mood_score" name="mood_score" min="1" max="5" required value="{{ entry.mood_score }}">

      <label for="note">Note (optional)</label>
      <textarea id="note" name="note">{{ entry.note }}</textarea>

      <label for="tags">Tags (comma-separated)</label>
      <input type="text" id="tags" name="tags" value="{{ entry.tags | join(', ') }}">

      <div class="actions">
        <button type="submit" class="btn btn-primary">Update Entry</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
